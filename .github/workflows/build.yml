name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka pyside6 playwright pycryptodome pillow ordered-set zstandard
        playwright install chromium
    
    - name: Build with Nuitka
      run: |
        python -m nuitka ^
          --standalone ^
          --onefile ^
          --windows-console-mode=attach ^
          --enable-plugin=pyside6 ^
          --output-filename=ProjectWIN.exe ^
          --assume-yes-for-downloads ^
          GUI.py
      shell: cmd
    
    - name: Prepare release files
      run: |
        mkdir release
        copy ProjectWIN.exe release\
        mkdir release\_internal
        mkdir release\_internal\bots
        mkdir release\_internal\bots\amazon
        mkdir release\_internal\bots\icloud
        mkdir release\_internal\settings
        mkdir release\_internal\cookies
        mkdir release\_internal\cookies\Amazon
        mkdir release\_internal\cookies\iCloud
        echo {} > release\_internal\settings\app_config.json
      shell: cmd
    
    - name: Create ZIP
      run: |
        Compress-Archive -Path release\* -DestinationPath ProjectWIN-${{ github.ref_name }}.zip
      shell: powershell
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProjectWIN-${{ github.ref_name }}
        path: ProjectWIN-${{ github.ref_name }}.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ProjectWIN-${{ github.ref_name }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}