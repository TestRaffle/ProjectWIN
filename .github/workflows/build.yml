name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka pyside6 playwright pycryptodome pillow ordered-set zstandard openpyxl requests beautifulsoup4 lxml faker
        playwright install chromium
      shell: cmd
    
    - name: Build with Nuitka
      run: |
        python -m nuitka ^
          --standalone ^
          --windows-console-mode=attach ^
          --windows-icon-from-ico=Logo.ico ^
          --enable-plugin=pyside6 ^
          --assume-yes-for-downloads ^
          --include-module=requests ^
          --include-module=urllib3 ^
          --include-module=charset_normalizer ^
          --include-module=certifi ^
          --include-module=idna ^
          --include-module=bs4 ^
          --include-module=lxml ^
          --include-module=faker ^
          --include-module=openpyxl ^
          GUI.py
      shell: cmd
    
    - name: Prepare release files
      run: |
        xcopy /E /I GUI.dist release
        ren release\GUI.exe ProjectWIN.exe
        if exist release\playwright\driver rmdir /s /q release\playwright\driver
        mkdir release\_internal
        mkdir release\_internal\settings
        mkdir release\_internal\cookies
        mkdir release\_internal\cookies\Amazon
        mkdir release\_internal\cookies\iCloud
        set VERSION=${{ github.ref_name }}
        set VERSION=%VERSION:v=%
        echo {"version": "%VERSION%"} > release\_internal\version.json
      shell: cmd
    
    - name: Create ZIP
      run: |
        Compress-Archive -Path release\* -DestinationPath ProjectWIN-${{ github.ref_name }}.zip
      shell: powershell
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProjectWIN-${{ github.ref_name }}
        path: ProjectWIN-${{ github.ref_name }}.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ProjectWIN-${{ github.ref_name }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
